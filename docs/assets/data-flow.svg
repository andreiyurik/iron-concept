<svg viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif; background:#0d1117;">
  <defs>
    <marker id="arrGreen" markerWidth="12" markerHeight="12" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#4caf50"/>
    </marker>
    <marker id="arrAmber" markerWidth="12" markerHeight="12" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#ff8a65"/>
    </marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.35"/></filter>
  </defs>

  <!-- Title -->
  <text x="490" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#e6e6e6">How IRON works — one tag's round trip</text>
  <text x="490" y="57" text-anchor="middle" font-size="12.5" fill="#9aa3ad">Data flows up to your screen; commands flow down through a single audited gate. The two never share a path.</text>

  <!-- ===================== READ LANE ===================== -->
  <text x="16" y="88" font-size="11" font-weight="700" fill="#4caf50" letter-spacing="1.5">▲  READ PATH — sensor to screen</text>

  <!-- READ boxes (y=98 h=66, center 131) -->
  <g filter="url(#sh)">
    <rect x="16"  y="98" width="168" height="66" rx="9" fill="rgba(76,175,80,0.10)" stroke="#4caf50" stroke-width="1.3"/>
    <rect x="208" y="98" width="168" height="66" rx="9" fill="rgba(76,175,80,0.10)" stroke="#4caf50" stroke-width="1.3"/>
    <rect x="400" y="98" width="168" height="66" rx="9" fill="rgba(76,175,80,0.10)" stroke="#4caf50" stroke-width="1.3"/>
    <rect x="592" y="98" width="168" height="66" rx="9" fill="rgba(76,175,80,0.10)" stroke="#4caf50" stroke-width="1.3"/>
    <rect x="784" y="98" width="168" height="66" rx="9" fill="rgba(76,175,80,0.10)" stroke="#4caf50" stroke-width="1.3"/>
  </g>

  <text x="100" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#c8e6c9">Sensor / PLC</text>
  <text x="100" y="145" text-anchor="middle" font-size="10.5" fill="#9e9e9e">physical signal</text>
  <text x="292" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#c8e6c9">Edge Agent · Rust</text>
  <text x="292" y="145" text-anchor="middle" font-size="10.5" fill="#9e9e9e">deadband · quality · buffer</text>
  <text x="484" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#c8e6c9">NATS broker</text>
  <text x="484" y="145" text-anchor="middle" font-size="10.5" fill="#9e9e9e">data subjects</text>
  <text x="676" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#c8e6c9">iron-web · Phoenix</text>
  <text x="676" y="145" text-anchor="middle" font-size="10.5" fill="#9e9e9e">Tag Engine · Historian</text>
  <text x="868" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#c8e6c9">Browser</text>
  <text x="868" y="145" text-anchor="middle" font-size="10.5" fill="#9e9e9e">LiveView dashboard, live</text>

  <!-- READ arrows (right) -->
  <line x1="186" y1="131" x2="205" y2="131" stroke="#4caf50" stroke-width="2" marker-end="url(#arrGreen)"/>
  <line x1="378" y1="131" x2="397" y2="131" stroke="#4caf50" stroke-width="2" marker-end="url(#arrGreen)"/>
  <line x1="570" y1="131" x2="589" y2="131" stroke="#4caf50" stroke-width="2" marker-end="url(#arrGreen)"/>
  <line x1="762" y1="131" x2="781" y2="131" stroke="#4caf50" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- ===================== SEPARATION BAND ===================== -->
  <rect x="16" y="208" width="936" height="94" rx="10" fill="rgba(233,120,90,0.06)" stroke="rgba(255,255,255,0.22)" stroke-width="1.3" stroke-dasharray="7 5"/>

  <!-- lock icon -->
  <g transform="translate(56,231)">
    <path d="M7,16 v-6 a10,10 0 0 1 20,0 v6" fill="none" stroke="#e0a060" stroke-width="4"/>
    <rect x="1" y="16" width="32" height="26" rx="4" fill="#e0a060"/>
    <circle cx="17" cy="27" r="3.4" fill="#0d1117"/>
    <rect x="15.4" y="27" width="3.2" height="8" rx="1.5" fill="#0d1117"/>
  </g>

  <text x="118" y="240" font-size="15" font-weight="700" fill="#ffd9c2">READ / WRITE separation — the sacred constraint</text>
  <text x="118" y="264" font-size="12" fill="#d0d0d0">Separate code paths · separate broker permissions · separate network rules.</text>
  <text x="118" y="285" font-size="12" font-weight="600" fill="#ffb59e">A bug in a dashboard cannot send a command to a machine.</text>

  <!-- ===================== WRITE LANE ===================== -->
  <text x="16" y="352" font-size="11" font-weight="700" fill="#ff8a65" letter-spacing="1.5">▼  WRITE PATH — operator to actuator (flows right → left)</text>

  <!-- WRITE boxes (y=366 h=66, center 399) -->
  <g filter="url(#sh)">
    <rect x="16"  y="366" width="168" height="66" rx="9" fill="rgba(255,138,101,0.10)" stroke="#ff8a65" stroke-width="1.3"/>
    <rect x="208" y="366" width="168" height="66" rx="9" fill="rgba(255,138,101,0.10)" stroke="#ff8a65" stroke-width="1.3"/>
    <rect x="400" y="366" width="168" height="66" rx="9" fill="rgba(255,138,101,0.10)" stroke="#ff8a65" stroke-width="1.3"/>
    <rect x="592" y="366" width="168" height="66" rx="9" fill="rgba(255,138,101,0.16)" stroke="#ff8a65" stroke-width="2"/>
    <rect x="784" y="366" width="168" height="66" rx="9" fill="rgba(255,138,101,0.10)" stroke="#ff8a65" stroke-width="1.3"/>
  </g>

  <text x="100" y="394" text-anchor="middle" font-size="13" font-weight="600" fill="#ffe0d3">Actuator / PLC</text>
  <text x="100" y="413" text-anchor="middle" font-size="10.5" fill="#a89a94">valve · motor · relay</text>
  <text x="292" y="394" text-anchor="middle" font-size="13" font-weight="600" fill="#ffe0d3">Edge Agent · Rust</text>
  <text x="292" y="413" text-anchor="middle" font-size="10.5" fill="#a89a94">runs authorized cmd only</text>
  <text x="484" y="394" text-anchor="middle" font-size="13" font-weight="600" fill="#ffe0d3">NATS broker</text>
  <text x="484" y="413" text-anchor="middle" font-size="10.5" fill="#a89a94">command subjects · own authz</text>
  <text x="676" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Command Service</text>
  <text x="676" y="411" text-anchor="middle" font-size="10.5" fill="#ffccb0">RBAC · full audit log · only gate</text>
  <text x="868" y="394" text-anchor="middle" font-size="13" font-weight="600" fill="#ffe0d3">Operator</text>
  <text x="868" y="413" text-anchor="middle" font-size="10.5" fill="#a89a94">clicks "Start pump"</text>

  <!-- WRITE arrows (left) -->
  <line x1="782" y1="399" x2="763" y2="399" stroke="#ff8a65" stroke-width="2" marker-end="url(#arrAmber)"/>
  <line x1="590" y1="399" x2="571" y2="399" stroke="#ff8a65" stroke-width="2" marker-end="url(#arrAmber)"/>
  <line x1="398" y1="399" x2="379" y2="399" stroke="#ff8a65" stroke-width="2" marker-end="url(#arrAmber)"/>
  <line x1="206" y1="399" x2="187" y2="399" stroke="#ff8a65" stroke-width="2" marker-end="url(#arrAmber)"/>

  <!-- Footer -->
  <text x="490" y="470" text-anchor="middle" font-size="11.5" fill="#8b939c">Same edge agent, same broker — yet data and commands ride separate subjects with separate permissions.</text>
  <text x="490" y="489" text-anchor="middle" font-size="11.5" fill="#8b939c">Every write is authenticated, authorized, and logged. Full spec: docs/specs/read-write-separation.md</text>
</svg>

<svg viewBox="0 0 970 372" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif; background:#0d1117;">
  <defs>
    <marker id="gGreen" markerWidth="11" markerHeight="11" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#66bb6a"/>
    </marker>
    <marker id="gBlue" markerWidth="11" markerHeight="11" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#4fc3f7"/>
    </marker>
    <marker id="gGray" markerWidth="11" markerHeight="11" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9aa3ad"/>
    </marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-opacity="0.35"/></filter>
  </defs>

  <!-- Title -->
  <text x="485" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#e6e6e6">The `iron` workflow — from empty folder to a running plant</text>
  <text x="485" y="54" text-anchor="middle" font-size="12" fill="#9aa3ad">One CLI. Config lives in Git. You build and test the whole system in simulation before any hardware exists.</text>

  <!-- ZONES -->
  <rect x="8"   y="72" width="524" height="214" rx="12" fill="rgba(76,175,80,0.055)" stroke="rgba(76,175,80,0.30)" stroke-width="1.2"/>
  <rect x="548" y="72" width="414" height="214" rx="12" fill="rgba(79,195,247,0.05)" stroke="rgba(79,195,247,0.30)" stroke-width="1.2"/>

  <text x="24"  y="96" font-size="12" font-weight="700" fill="#81c784" letter-spacing="0.6">① DESIGN &amp; SIMULATE — your laptop, zero hardware</text>
  <text x="564" y="96" font-size="12" font-weight="700" fill="#6fc9f2" letter-spacing="0.6">② SHIP &amp; OPERATE — at the plant</text>

  <!-- ===== LEFT CHIPS ===== -->
  <g filter="url(#sh)">
    <rect x="20"  y="122" width="110" height="48" rx="8" fill="rgba(76,175,80,0.13)" stroke="#66bb6a" stroke-width="1.4"/>
    <rect x="150" y="122" width="110" height="48" rx="8" fill="rgba(76,175,80,0.13)" stroke="#66bb6a" stroke-width="1.4"/>
    <rect x="280" y="122" width="110" height="48" rx="8" fill="rgba(76,175,80,0.13)" stroke="#66bb6a" stroke-width="1.4"/>
    <rect x="410" y="122" width="110" height="48" rx="8" fill="rgba(76,175,80,0.13)" stroke="#66bb6a" stroke-width="1.4"/>
  </g>
  <text x="75"  y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#e8f5e9" font-family="ui-monospace, Menlo, monospace">iron new</text>
  <text x="75"  y="161" text-anchor="middle" font-size="8.5" fill="#9e9e9e">scaffold project</text>
  <text x="205" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#e8f5e9" font-family="ui-monospace, Menlo, monospace">iron simulate</text>
  <text x="205" y="161" text-anchor="middle" font-size="8.5" fill="#9e9e9e">fake the signals</text>
  <text x="335" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#e8f5e9" font-family="ui-monospace, Menlo, monospace">iron dev</text>
  <text x="335" y="161" text-anchor="middle" font-size="8.5" fill="#9e9e9e">live dashboard</text>
  <text x="465" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#e8f5e9" font-family="ui-monospace, Menlo, monospace">iron validate</text>
  <text x="465" y="161" text-anchor="middle" font-size="8.5" fill="#9e9e9e">check every spec</text>

  <!-- left arrows -->
  <line x1="132" y1="146" x2="147" y2="146" stroke="#66bb6a" stroke-width="2" marker-end="url(#gGreen)"/>
  <line x1="262" y1="146" x2="277" y2="146" stroke="#66bb6a" stroke-width="2" marker-end="url(#gGreen)"/>
  <line x1="392" y1="146" x2="407" y2="146" stroke="#66bb6a" stroke-width="2" marker-end="url(#gGreen)"/>

  <!-- iterate loop (below chips) -->
  <path d="M465,172 C465,206 75,206 75,174" fill="none" stroke="#66bb6a" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#gGreen)"/>
  <text x="270" y="228" text-anchor="middle" font-size="11" font-weight="600" fill="#a5d6a7">iterate in seconds — no hardware, no license key</text>

  <text x="270" y="252" text-anchor="middle" font-size="11" fill="#c0c6cc">→ live at localhost:4000 with simulated sensors · the falsifiable 5-minute path</text>
  <text x="270" y="271" text-anchor="middle" font-size="10.5" fill="#8b939c">the simulator is the same binary, not a toy · AI-generated config is safe because it must pass validate</text>

  <!-- ===== DIVIDER ===== -->
  <line x1="540" y1="110" x2="540" y2="252" stroke="#9aa3ad" stroke-width="1.3" stroke-dasharray="5 5"/>
  <text x="540" y="104" text-anchor="middle" font-size="10.5" font-weight="700" fill="#c9d1d9">git commit</text>
  <text x="540" y="266" text-anchor="middle" font-size="9.5" fill="#8b939c">now: real hardware</text>

  <!-- cross-divider arrow: validate -> deploy -->
  <line x1="522" y1="146" x2="587" y2="146" stroke="#9aa3ad" stroke-width="2" marker-end="url(#gGray)"/>

  <!-- ===== RIGHT CHIPS ===== -->
  <g filter="url(#sh)">
    <rect x="590" y="122" width="110" height="48" rx="8" fill="rgba(79,195,247,0.13)" stroke="#4fc3f7" stroke-width="1.4"/>
    <rect x="720" y="122" width="110" height="48" rx="8" fill="rgba(255,152,0,0.15)" stroke="#ffb74d" stroke-width="1.7"/>
    <rect x="850" y="122" width="102" height="48" rx="8" fill="rgba(79,195,247,0.13)" stroke="#4fc3f7" stroke-width="1.4"/>
  </g>
  <text x="645" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#e1f5fe" font-family="ui-monospace, Menlo, monospace">iron deploy</text>
  <text x="645" y="161" text-anchor="middle" font-size="8.5" fill="#9e9e9e">zero-downtime</text>
  <text x="775" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#fff3e0" font-family="ui-monospace, Menlo, monospace">iron field</text>
  <text x="775" y="161" text-anchor="middle" font-size="8.5" fill="#e0b380">commission ★</text>
  <text x="901" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#e1f5fe" font-family="ui-monospace, Menlo, monospace">iron diff</text>
  <text x="901" y="161" text-anchor="middle" font-size="8.5" fill="#9e9e9e">detect drift</text>

  <!-- right arrows -->
  <line x1="702" y1="146" x2="717" y2="146" stroke="#4fc3f7" stroke-width="2" marker-end="url(#gBlue)"/>
  <line x1="832" y1="146" x2="847" y2="146" stroke="#4fc3f7" stroke-width="2" marker-end="url(#gBlue)"/>

  <text x="755" y="252" text-anchor="middle" font-size="11" fill="#c0c6cc">→ deploy to a $150 mini-PC · commissioning results in Git · drift caught forever</text>
  <text x="755" y="271" text-anchor="middle" font-size="10.5" fill="#8b939c">★ field verification as a product — no other SCADA platform ships this</text>

  <!-- Footer -->
  <text x="485" y="316" text-anchor="middle" font-size="11.5" fill="#8b939c">config/ (tags · commands · dashboards · mimics) is plain YAML in Git — reviewable, diffable, AI-generatable, deterministically validated.</text>
  <text x="485" y="340" text-anchor="middle" font-size="10.5" fill="#6f7883">Full command contract: docs/specs/cli.md</text>
</svg>

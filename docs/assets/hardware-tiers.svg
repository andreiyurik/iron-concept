  <text x="608" y="342" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#8B5E00">Separation required</text>
  <text x="608" y="359" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#333333">WAGO = scan cycle (PLC)</text>
  <text x="608" y="374" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#333333">x86 IPC = Phoenix SCADA</text>
  <text x="608" y="393" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#666666">Link: OPC-UA / MQTT</text>
  <text x="608" y="408" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#666666">SCADA down -&gt; PLC keeps running</text>


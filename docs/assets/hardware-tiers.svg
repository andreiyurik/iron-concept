  <text x="273" y="503" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#888888">~$2000–8000 · Elixir cluster · HA · TimescaleDB</text>
  <circle cx="265" cy="516" r="3" fill="#D85A30"/>
  <text x="273" y="519" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#111111">WAGO as OPC-UA Gateway</text>

  <text x="64" y="328" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#111111">Tier 3 — Industrial</text>
  <text x="64" y="343" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#777777">Mid-size plant, food &amp; beverage, 2K–50K tags</text>

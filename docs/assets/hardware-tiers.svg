  <text x="70" y="263" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#444444">$ iron new pump_station</text>

  <line x1="252" y1="195" x2="252" y2="290" stroke="#e0e0d8" stroke-width="0.5"/>
  <line x1="600" y1="195" x2="600" y2="290" stroke="#e0e0d8" stroke-width="0.5"/>

  <text x="260" y="199" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" font-weight="600" fill="#aaaaaa" letter-spacing="0.8">HARDWARE</text>
  <circle cx="265" cy="214" r="3" fill="#5DCAA5"/>
  <text x="273" y="217" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#111111">RevPi Connect 5 — flagship</text>
  <text x="273" y="229" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#888888">~$350–500 · CM5 · EN 61131-2 · TPM 2.0 · Nerves</text>
  <circle cx="265" cy="242" r="3" fill="#5DCAA5"/>
  <text x="273" y="245" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#111111">Unipi Neuron L533</text>
  <text x="273" y="257" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#888888">~$300–500 · CM4 · 56DI + 14AI + 14AO · all-in-one</text>
  <circle cx="265" cy="270" r="3" fill="#5DCAA5"/>
  <text x="273" y="273" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#111111">Unipi Patron S207</text>
  <text x="273" y="285" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#888888">~$300–700 · i.MX 8M Mini · eMMC 8GB · more reliable than SD</text>

  <text x="608" y="199" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" font-weight="600" fill="#aaaaaa" letter-spacing="0.8">ARCHITECTURE</text>
  <text x="608" y="216" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#333333">One Linux controller:</text>
  <text x="608" y="231" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#333333">Rust PLC runtime</text>
  <text x="608" y="246" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#333333">+ Nerves (OTA, A/B)</text>
  <text x="608" y="261" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#333333">+ Phoenix SCADA</text>
  <text x="608" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#666666">PLC = SCADA = Edge</text>


  <text x="608" y="445" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" font-weight="600" fill="#aaaaaa" letter-spacing="0.8">ARCHITECTURE</text>
  <text x="608" y="462" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#A8401A">"Trojan horse":</text>

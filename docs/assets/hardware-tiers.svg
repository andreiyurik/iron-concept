  <text x="40" y="247" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="white">2</text>

  <text x="64" y="205" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#111111">Tier 2 — Professional</text>
  <text x="64" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#777777">Small plant, pump station, water utility</text>
  <rect x="64" y="228" width="76" height="16" rx="4" fill="#D4F4EC"/>
  <text x="102" y="240" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#1A7A5A">$200 — $800</text>

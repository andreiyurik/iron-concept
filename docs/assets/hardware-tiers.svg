  <text x="273" y="352" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#888888">~$800–1200 · Linux + CODESYS + Docker · OPC-UA</text>
  <circle cx="265" cy="365" r="3" fill="#7F77DD"/>
  <text x="273" y="368" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#111111">x86 IPC (Beelink, Advantech) — SCADA</text>
  <text x="273" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#888888">~$150–1500 · Phoenix + TimescaleDB + Grafana</text>
  <circle cx="265" cy="393" r="3" fill="#7F77DD"/>
  <text x="273" y="396" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#111111">BeagleBone Black Industrial</text>
  <text x="273" y="408" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#888888">~$270–500 · PRU &lt;10 ns · EtherCAT possible</text>

  <text x="608" y="322" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" font-weight="600" fill="#aaaaaa" letter-spacing="0.8">ARCHITECTURE</text>

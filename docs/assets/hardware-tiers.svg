<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 595" width="860" height="595">

  <!-- BACKGROUND -->
  <rect width="860" height="595" fill="#f7f7f5" rx="12"/>

  <!-- TITLE -->
  <text x="40" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#111111">IRON — Hardware Selection by Tier</text>
  <text x="40" y="54" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#888888">4 tiers · one architecture · different hardware · one iron new command</text>

  <!-- ═══════════ TIER 1  y=62 ═══════════ -->
  <rect x="16" y="62" width="828" height="115" rx="8" fill="white" stroke="#e0e0d8" stroke-width="0.5"/>
  <rect x="16" y="62" width="5" height="115" rx="2" fill="#97C459"/>
  <circle cx="40" cy="119" r="15" fill="#4A8C1C"/>
  <text x="40" y="124" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="white">1</text>

  <text x="64" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#111111">Tier 1 — Starter</text>
  <text x="64" y="97" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#777777">Farm, greenhouse, home, PoC</text>
  <rect x="64" y="105" width="72" height="16" rx="4" fill="#EAF3DE"/>
  <text x="100" y="117" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#3B7D11">$50 — $300</text>
  <rect x="64" y="128" width="175" height="16" rx="3" fill="#f0f0ec"/>
  <text x="70" y="140" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#444444">$ iron new greenhouse</text>

  <line x1="252" y1="72" x2="252" y2="167" stroke="#e0e0d8" stroke-width="0.5"/>
  <line x1="600" y1="72" x2="600" y2="167" stroke="#e0e0d8" stroke-width="0.5"/>

  <text x="260" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" font-weight="600" fill="#aaaaaa" letter-spacing="0.8">HARDWARE</text>
  <circle cx="265" cy="91" r="3" fill="#97C459"/>
  <text x="273" y="94" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#111111">Raspberry Pi 5 + Industrial HAT</text>
  <text x="273" y="106" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#888888">~$100 · GPIO / I2C / 1-Wire · all-in-one Linux</text>
  <circle cx="265" cy="119" r="3" fill="#97C459"/>
  <text x="273" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#111111">Industrial Shields ESP32 PLC</text>
  <text x="273" y="134" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#888888">~$80–150 · DIN rail · Modbus RTU/TCP</text>
  <circle cx="265" cy="147" r="3" fill="#97C459"/>
  <text x="273" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#111111">Arduino Opta / NORVI ESP32</text>
  <text x="273" y="162" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#888888">~$80–170 · 8DI/4DO/relay · RS-485</text>

  <text x="608" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" font-weight="600" fill="#aaaaaa" letter-spacing="0.8">ARCHITECTURE</text>
  <text x="608" y="93" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#333333">RPi 5: PLC + Edge + SCADA</text>
  <text x="608" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#333333">on one device</text>
  <text x="608" y="127" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#666666">ESP32 = I/O node</text>
  <text x="608" y="142" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#666666">-&gt; Modbus -&gt; RPi</text>

